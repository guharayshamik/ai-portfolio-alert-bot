name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      TELEGRAM_BOT_TOKEN: dummy
      TELEGRAM_CHAT_ID: dummy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile check
        run: |
          python -m py_compile app/main.py app/earnings.py app/watchlists.py app/macro/dashboard.py app/macro/rules.py app/macro/fred.py

      - name: Run tests
        run: |
          pytest -q
